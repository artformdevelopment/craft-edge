name: release
on:
  push:
    tags:
      - '[0-9]+.[0-9]+.[0-9]+'
permissions:
  contents: write
jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Extract release notes from the changelog
        run: awk '/^## /{n++} n==1' CHANGELOG.md | tail -n +2 > /tmp/notes.md
      - name: Create the GitHub release
        run: gh release create "$GITHUB_REF_NAME" --title "$GITHUB_REF_NAME" --notes-file /tmp/notes.md
        env:
          GH_TOKEN: ${{ github.token }}
