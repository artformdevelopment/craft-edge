# =============================================================================
# Edge: nginx-fastcgi driver reference config
#
# nginx's own fastcgi_cache stores the PHP responses as they stream through. Edge
# does not write files for this driver; it controls WHAT gets stored through the
# origin's Cache-Control headers, and it PURGES through the ngx_cache_purge module.
#
# Two things must line up with the driver:
#   - the cache key is  "$host$request_uri"  (scheme-less, so an http purge request
#     matches a page that was cached over https),
#   - the purge location reconstructs that same key as  "$host$1$is_args$args".
#
# ---------------------------------------------------------------------------
# REQUIREMENTS:
#   - The ngx_cache_purge module must be installed and loaded. On Debian/Ubuntu:
#         apt-get install libnginx-mod-http-cache-purge
#     Stock nginx does NOT include it. Without it, `fastcgi_cache_purge` is an
#     "unknown directive" and nginx won't start; and Edge's purges fail with a clear
#     error (there is no silent fallback).
#   - Set your Edge `fastCgiPurgeUrl` to the purge location, e.g.
#         http://127.0.0.1/edge-purge
#
# BEFORE YOU USE THIS:
#   1. Keep the bypass-cookie regex in sync with your `bypassCookies` setting.
#   2. Adjust the fastcgi_cache_path location/size/zone to taste.
#   3. Merge into your existing Craft server block.
# ---------------------------------------------------------------------------

# --- Bypass decision ---------------------------------------------------------
# $edge_skip = 1 means: do not serve from cache AND do not store.
# Opt-in bypass cookies only. The plugin default `bypassCookies` is an empty list
# (identity cookies are deliberately NOT bypassed: a signed-in visitor is served
# the shared shell and personalizes client-side through the island endpoints), so
# this map ships matching nothing. If you configure bypass cookies (a live cart
# cookie, an `edge_bypass` cookie), list them as an alternation, e.g.
#     "~*(cart_cookie|edge_bypass)=" 1;
map $http_cookie $edge_skip_cookie {
    default 0;
}
map $request_method $edge_skip_method { default 1; GET 0; HEAD 0; }

# Preview / token / debug query params force a live render. Matched against $args
# directly: nginx variable names cannot contain hyphens, so something like
# "$arg_x-craft-preview" would silently parse as "$arg_x" + the literal text
# "-craft-preview", i.e. a non-empty value that matches every request.
map $args $edge_skip_args {
    default 0;
    "~(^|&)(token|x-craft-preview|x-craft-live-preview|no-cache)(=|&|$)" 1;
}

map "$edge_skip_cookie$edge_skip_method$edge_skip_args" $edge_skip {
    default 1;
    "000"   0;
}

# --- Cache zone (http scope) -------------------------------------------------
fastcgi_cache_path /var/cache/nginx/edge levels=1:2 keys_zone=edge:100m
                   inactive=7d max_size=2g;

server {
    # ... your existing Craft server block: listen, server_name, ssl_*, root web/ ...

    # Edge's own dynamic endpoints must never be cached.
    location ^~ /edge/ {
        try_files $uri /index.php?$query_string;
    }

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ [^/]\.php(/|$) {
        # ... your standard Craft FastCGI block (fastcgi_pass, SCRIPT_FILENAME, etc.) ...

        # --- Edge FastCGI cache ---
        fastcgi_cache        edge;
        # Scheme-less key: an http purge request must match an https-cached page.
        fastcgi_cache_key    "$host$request_uri";
        fastcgi_cache_valid  200 7d;

        # Don't serve from / don't store into the cache when the request must be live:
        # non-GET, preview/token/no-cache params, or an opt-in bypass cookie.
        # (nginx also refuses on its own to cache responses that carry Set-Cookie or
        #  Cache-Control: private/no-store. Edge's origin headers are the primary
        #  storage control; this map is the serving-side guard for requests that must
        #  never be answered from the shared copy.)
        fastcgi_cache_bypass $edge_skip;
        fastcgi_no_cache     $edge_skip;

        # Expose HIT/MISS so `edge/nginx/verify` and curl can see it.
        add_header X-Edge-Cache $upstream_cache_status always;
    }

    # --- Purge location (ngx_cache_purge) ---
    # Edge sends GET http://127.0.0.1/edge-purge/<uri> with the site's Host header.
    # We capture <uri> into $1 and rebuild the exact cache key.
    # Lock it to localhost so nobody can purge from outside.
    location ~ ^/edge-purge(/.*)$ {
        allow 127.0.0.1;
        allow ::1;
        deny  all;
        fastcgi_cache_purge edge "$host$1$is_args$args";
    }
}
