# =============================================================================
# Edge: nginx-static driver reference config
#
# Edge writes each cacheable page to disk as:
#
#     <cachePath>/<host>/<uri>/index.html
#
# e.g. cachePath "@storage/edge-cache", host "example.com", request "/blog/hello"
#      -> <storage>/edge-cache/example.com/blog/hello/index.html
#      the homepage ("/") is stored at .../example.com/index.html
#
# The cache directory lives OUTSIDE the web root, so a cache file is never
# addressable by any direct URL; physical separation is the security property.
# nginx still serves hits BEFORE PHP runs: `location /` falls through to the
# internal named location @edge, which switches `root` to the cache directory
# and try_files the shell file. Only a request that is safe to serve from a
# shared, cookie-free copy gets that far. If the file is missing (the origin
# never cached it) or the request must be personal (an opt-in bypass cookie, a
# preview token, a POST), the request reaches PHP as normal.
#
# ---------------------------------------------------------------------------
# BEFORE YOU USE THIS:
#   1. Set the `root` inside @edge to your Edge `cachePath` (this file assumes
#      the default @storage/edge-cache, i.e. <project>/storage/edge-cache).
#   2. Keep the bypass-cookie map in sync with your `bypassCookies` setting
#      (empty by default, so the map ships matching nothing).
#   3. This config targets the default `queryStringCaching: 'ignore'`. If you use
#      'respect', see the note at the bottom.
#   4. Merge the `location` blocks into your existing Craft server block, don't
#      just paste a second `server {}`.
#
# Two details that matter (both are already handled below):
#   - `location /` must be `try_files $uri @edge;` with NO `$uri/` entry: with
#     `$uri/` present, the homepage ("/") matches the web-root directory itself
#     and nginx serves index.php, never consulting the cache.
#   - @edge switches `root` to the cache directory, so the `.php` location MUST
#     pin `root` back to the web root, or the /index.php fallback 404s.
# ---------------------------------------------------------------------------

# --- Bypass decision (server/http scope) -------------------------------------
# Build a single variable, $edge_skip: 1 = never serve from the cache.

# Opt-in bypass cookies. Keep in sync with `bypassCookies`. The plugin default is
# an empty list (identity cookies are deliberately NOT bypassed: a signed-in
# visitor is served the same shared shell as everyone else and personalizes
# client-side through the island endpoints), so this map ships matching nothing.
# If you configure bypass cookies (a live cart cookie, an `edge_bypass` cookie),
# list them here as an alternation, e.g. "~*(cart_cookie|edge_bypass)=" 1;
map $http_cookie $edge_skip_cookie {
    default 0;
}

# Only GET/HEAD are served from the static cache (matching the plugin's own rule).
# Everything else goes to PHP.
map $request_method $edge_skip_method {
    default 1;
    GET     0;
    HEAD    0;
}

# Preview / token / debug query params force a live render. Matched against $args
# directly: nginx variable names cannot contain hyphens, so something like
# "$arg_x-craft-preview" would silently parse as "$arg_x" + the literal text
# "-craft-preview", i.e. a non-empty value that matches every request.
map $args $edge_skip_args {
    default 0;
    "~(^|&)(token|x-craft-preview|x-craft-live-preview|no-cache)(=|&|$)" 1;
}

map "$edge_skip_cookie$edge_skip_method$edge_skip_args" $edge_skip {
    default 1;
    "000"   0;
}

server {
    # ... your existing Craft server block: listen, server_name, ssl_*, etc. ...

    # Point root at Craft's web/ directory as usual.
    root /var/www/html/web;

    # Edge's own dynamic endpoints must ALWAYS reach PHP (never served from a file).
    location ^~ /edge/ {
        try_files $uri /index.php?$query_string;
    }

    # The control panel and action requests must always reach PHP too. (Adjust the
    # cpTrigger if you've changed it from the default "admin".)
    location ^~ /admin {
        try_files $uri /index.php?$query_string;
    }

    # Real files and assets are served from the web root first; everything else
    # falls through to @edge. NO `$uri/` entry here (see the header note).
    location / {
        try_files $uri @edge;
    }

    # Serve the pre-rendered shared shell from OUTSIDE the web root.
    location @edge {
        # A bypass request (non-GET, preview/token/no-cache, or an opt-in bypass
        # cookie) goes straight to Craft, never the cache.
        if ($edge_skip) {
            rewrite ^ /index.php?$query_string last;
        }
        # Your Edge `cachePath`, resolved to an absolute path.
        root /var/www/html/storage/edge-cache;
        try_files /$host$uri/index.html /index.php?$query_string;
    }

    location ~ [^/]\.php(/|$) {
        # @edge switches `root`; index.php must resolve under the web root.
        root /var/www/html/web;
        # ... your standard Craft FastCGI block (fastcgi_pass, SCRIPT_FILENAME, etc.) ...
    }
}

# ---------------------------------------------------------------------------
# queryStringCaching: 'respect'
#
# In 'respect' mode the plugin stores a separate file per allowed query string, at
#     <cachePath>/<host>/<uri>/<query>/index.html
# where <query> is the canonicalized (sorted, marketing-params-stripped) query string.
# Reproducing that canonical form in nginx is fiddly, so the simplest reliable options
# are: (a) keep 'ignore' mode for the static driver, or (b) use the nginx-fastcgi or
# cloudflare tier for query-varying pages, where the tier owns the cache key. If you
# genuinely need per-query static files, append the raw args as a path segment and
# accept that only exact-match query strings will hit.
# ---------------------------------------------------------------------------
