# Craft server block with the Edge nginx-static driver config merged in,
# following docs/nginx-static.conf (bypass maps + internal @edge cache location).

# --- Bypass decision (http scope) --------------------------------------------
# Opt-in bypass cookies only. Keep in sync with `bypassCookies`: this example
# configures a single demo cookie, `edge_bypass`, in config/edge.php, so that is
# the one listed here. Identity cookies are deliberately absent: a signed-in
# visitor is served the shared shell and personalizes client-side via islands.
map $http_cookie $edge_skip_cookie {
    default 0;
    "~*(edge_bypass)=" 1;
}

# Only GET/HEAD are served from the static cache. Everything else goes to PHP.
map $request_method $edge_skip_method {
    default 1;
    GET     0;
    HEAD    0;
}

# Preview / token / debug query params force a live render. Matched against $args
# directly: nginx variable names can't contain hyphens, so $arg_x-craft-preview
# would silently parse as "$arg_x" + literal "-craft-preview" and always match.
# The second rule matches any param that ISN'T stripped from the cache key by
# `excludedQueryStringParams`. Under queryStringCaching: 'ignore' the query string is not
# part of the key, so /blog?tag=x must never be answered from the bare /blog entry. Edge
# applies the same rule at the origin and declines to store those responses.
map $args $edge_skip_args {
    default 0;
    "~(^|&)(token|x-craft-preview|x-craft-live-preview|no-cache)(=|&|$)" 1;
    "~(^|&)(?!utm_|gclid=|fbclid=|_ga=|mc_cid=|mc_eid=)[^=&]+=" 1;
}

map "$edge_skip_cookie$edge_skip_method$edge_skip_args" $edge_skip {
    default 1;
    "000"   0;
}

server {
    listen 80;
    server_name localhost;

    root /app/web;
    index index.php;

    # Demo aid (not part of the reference config): expose the bypass decision so you
    # can watch it while experimenting. skip=1 means "this request must reach PHP".
    add_header X-Edge-Debug "skip=$edge_skip cookie=$edge_skip_cookie method=$edge_skip_method args=$edge_skip_args" always;

    # Edge's own dynamic endpoints must ALWAYS reach PHP (never served from a file).
    location ^~ /edge/ {
        try_files $uri /index.php?$query_string;
    }

    # The control panel and action requests must always reach PHP too.
    location ^~ /admin {
        try_files $uri /index.php?$query_string;
    }

    # Action requests (async CSRF, form posts, payment return URLs) must never be
    # answered from the cache or served from disk.
    location ^~ /actions/ {
        try_files $uri /index.php?$query_string;
    }

    # Real files and assets are served from the web root first; everything else falls
    # through to the internal cache resolver. Do NOT add `$uri/` before @edge: the
    # homepage ("/") would match the web-root directory and serve index.php directly,
    # never consulting the cache. @edge owns the fallthrough.
    location / {
        try_files $uri @edge;
    }

    # Serve the pre-rendered shared shell from OUTSIDE the web root. The cache files
    # live under /app/storage/edge-cache (`cachePath: @storage/edge-cache`), so they
    # are never addressable by any direct URL; this internal location is the only way
    # nginx reads them.
    location @edge {
        # A bypass request (non-GET, preview/token/no-cache, or an opt-in bypass
        # cookie) goes straight to Craft, never the cache.
        if ($edge_skip) {
            rewrite ^ /index.php?$query_string last;
        }
        root /app/storage/edge-cache;

        # nginx serves the stored file verbatim, so the origin's Cache-Control never
        # reaches the browser on a hit. Without this browsers fall back to heuristic
        # freshness and hold pages for a window no purge can reach.
        add_header Cache-Control "public, max-age=0, must-revalidate" always;

        try_files /$host$uri/index.html /index.php?$query_string;
    }

    location ~ [^/]\.php(/|$) {
        # @edge switches `root` to the cache directory; index.php must resolve under
        # the web root, so pin it here.
        root /app/web;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_pass 127.0.0.1:9000;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
        fastcgi_param HTTP_PROXY "";
    }
}
